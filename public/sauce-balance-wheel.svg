<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Sauce balance wheel reference">
  <circle cx="200" cy="200" r="188" fill="#0f172a"/>
  <!-- Acid top: 225°–315° -->
  <path
    d="M 200 200 L 76.26 76.26 A 175 175 0 0 1 323.74 76.26 Z"
    fill="#b91c1c"
  />
  <!-- Fat right: 315°–45° -->
  <path
    d="M 200 200 L 323.74 76.26 A 175 175 0 0 1 323.74 323.74 Z"
    fill="#d97706"
  />
  <!-- Sweet bottom: 45°–135° -->
  <path
    d="M 200 200 L 323.74 323.74 A 175 175 0 0 1 76.26 323.74 Z"
    fill="#15803d"
  />
  <!-- Salt left: 135°–225° -->
  <path
    d="M 200 200 L 76.26 323.74 A 175 175 0 0 1 76.26 76.26 Z"
    fill="#1d4ed8"
  />
  <circle cx="200" cy="200" r="72" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="200" y="198" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700" font-family="system-ui,sans-serif">Balanced</text>
  <text x="200" y="216" text-anchor="middle" fill="#475569" font-size="11" font-weight="600" font-family="system-ui,sans-serif">sauce</text>
  <text x="200" y="38" text-anchor="middle" fill="#fef2f2" font-size="16" font-weight="800" font-family="system-ui,sans-serif" letter-spacing="0.08em">ACID</text>
  <text x="368" y="208" text-anchor="end" fill="#fffbeb" font-size="16" font-weight="800" font-family="system-ui,sans-serif" letter-spacing="0.08em">FAT</text>
  <text x="200" y="378" text-anchor="middle" fill="#ecfdf5" font-size="16" font-weight="800" font-family="system-ui,sans-serif" letter-spacing="0.08em">SWEET</text>
  <text x="32" y="208" text-anchor="start" fill="#eff6ff" font-size="16" font-weight="800" font-family="system-ui,sans-serif" letter-spacing="0.08em">SALT</text>
  <line x1="200" y1="200" x2="200" y2="48" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="200" y1="200" x2="352" y2="200" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="200" y1="200" x2="200" y2="352" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="200" y1="200" x2="48" y2="200" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
</svg>
